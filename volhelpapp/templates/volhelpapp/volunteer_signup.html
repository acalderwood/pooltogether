<form action="{% url 'volunteer_signup' %}" method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            {% if field.help_text %}
                <small class="optional">{{ field.help_text }}</small>
            {% endif %}
            {% for error in field.errors %}
                <small class="error">{{ error }}</small>
            {% endfor %}
        </div>
    {% endfor %}
    <button type="submit">Submit</button>
</form>
